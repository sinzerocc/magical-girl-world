<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法少女世界 - 阶梯</title>
    <script>
        if (sessionStorage.getItem('gate_key') !== 'stage2') {
            alert('運命を欺くことはできない。 / You cannot deceive fate.');
            window.location.href = 'index.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #05050a; font-family: "MS Mincho", "Heiti SC", serif; touch-action: manipulation; }
        .bg-image { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; position: absolute; top: 0; left: 0; z-index: 1; filter: brightness(0.4) contrast(1.2); transition: filter 2.5s ease; }
        .container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; transition: opacity 1.5s ease; }
        .ghost-text { color: #fff; font-size: 1.8rem; font-weight: 700; text-align: center; line-height: 2; letter-spacing: 3px; user-select: none; pointer-events: none; text-shadow: -2px -2px 4px rgba(255, 0, 76, 0.9), 2px 2px 6px rgba(138, 43, 226, 0.9), 0 0 20px rgba(255, 0, 76, 0.4); animation: textPulse 3s infinite alternate ease-in-out; margin-bottom: 40px; }
        .puzzle-box { display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(10px); transition: opacity 1.5s ease, transform 1.5s ease; pointer-events: none; }
        .puzzle-box.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .question { color: #ff4a76; font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255, 74, 118, 0.5); text-align: center; line-height: 1.5; }
        .secret-input { background: transparent; border: none; border-bottom: 2px solid #551a28; color: #fff; font-size: 1.5rem; text-align: center; padding: 5px; width: 200px; outline: none; font-family: monospace; letter-spacing: 2px; transition: border-color 0.5s; }
        .secret-input:focus { border-bottom: 2px solid #ff4a76; }

        /* ==========================================
           ☀️ 重构：太阳升级圣光特效（缓缓浸染）
           ========================================== */
        .holy-light-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* 极其柔和温暖的太阳核心放射光晕 */
            background: radial-gradient(circle at center, rgba(255, 255, 240, 1) 0%, rgba(255, 240, 180, 0.95) 25%, rgba(255, 255, 255, 0) 70%);
            z-index: 10;
            opacity: 0;
            transform: scale(0.3);
            pointer-events: none;
            /* 3.5秒丝滑过渡，模拟黎明破晓的平缓质感 */
            transition: opacity 2s ease-in-out, transform 3.5s cubic-bezier(0.33, 1, 0.68, 1);
        }
        
        /* 圣光如太阳般升起扩散 */
        .holy-light-overlay.ascend {
            opacity: 1;
            transform: scale(2.8);
        }

        /* ==========================================
           👑 重构：正中心抗强光高清晰祝贺文字
           ========================================== */
        .congrats-text {
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -40%) scale(0.95); /* 绝对居中定位基准 */
            z-index: 11;
            
            /* 白金至亮金高贵渐变字 */
            background: linear-gradient(to bottom, #ffffff 0%, #ffe89e 40%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            font-size: 2.2rem; font-weight: 900; letter-spacing: 8px; text-align: center; line-height: 1.8;
            opacity: 0;
            /* 伴随太阳升起，文字慢半拍优雅浮现 */
            transition: opacity 1.2s ease-in-out 0.8s, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s;
            pointer-events: none;
            
            /* 核心黑魔法：多层重度纯黑阴影嵌套，形成天然高反差轮廓，背景再亮也绝对清晰 */
            filter: drop-shadow(0 0 3px #000000) 
                    drop-shadow(0 2px 8px rgba(0, 0, 0, 0.9)) 
                    drop-shadow(0 4px 20px rgba(0, 0, 0, 0.9));
        }
        
        /* 圣光正中央文字显现 */
        .congrats-text.show {
            opacity: 1; 
            transform: translate(-50%, -50%) scale(1); /* 完美死锁正中心 */
        }

        @keyframes textPulse { 0% { transform: scale(0.99); filter: hue-rotate(0deg); } 100% { transform: scale(1.01); filter: hue-rotate(15deg); } }
        
        /* 原UI解体淡出稍微拉长，配合太阳升起的节奏 */
        .shatter-ui { opacity: 0 !important; transform: scale(1.02) translateY(-10px) !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <div id="holyLight" class="holy-light-overlay"></div>
    
    <div id="congratsText" class="congrats-text">
        おめでとう。<br>
        <span style="font-size: 1.4rem; letter-spacing: 4px; font-weight: 700;">Congratulations.</span>
    </div>

    <img id="randomImg" class="bg-image" src="" alt="Loading...">

    <div class="container" id="mainContainer">
        <div class="ghost-text">
            魔法少女の世界へようこそ。<br>
            君はどこまで辿着けるかな、楽しみにしているよ。<br>
            <span style="font-size: 1.3rem; display: block; margin-top: 10px; font-family: monospace;">
                Welcome to the Magical Girl World.<br>
                How far can you reach? I'm looking forward to it.
            </span>
        </div>

        <div id="puzzleBox" class="puzzle-box">
            <div class="question">作者が最も愛している人は誰ですか？<br><span style="font-size: 0.8rem; color: #aaa;">Who is the person the author loves the most?</span></div>
            <input type="text" id="secretInput" class="secret-input" autocomplete="off" placeholder="......">
        </div>
    </div>

    <audio id="bgm2" src="./bgm2.mp3" loop></audio>

    <script>
        // 1. 本地图片加载
        const myImages = ['./p21.jpg'];
        document.getElementById('randomImg').src = myImages[0];

        // 2. 播放本地歌曲
        const audio = document.getElementById('bgm2');
        function tryPlayMusic() {
            audio.play().then(() => {
                document.removeEventListener('click', tryPlayMusic);
            }).catch(err => {});
        }
        tryPlayMusic();
        document.addEventListener('click', tryPlayMusic);

        // 3. 浮现谜题
        const puzzleBox = document.getElementById('puzzleBox');
        const secretInput = document.getElementById('secretInput');

        setTimeout(() => {
            puzzleBox.classList.add('show');
            secretInput.focus();
        }, 3000);

        // 4. 输入 yip 触发“太阳加冕”仪式
        secretInput.addEventListener('input', function() {
            const inputValue = secretInput.value.trim().toLowerCase();
            if (inputValue === 'yip') {
                secretInput.blur();
                
                // ==========================================
                // ☀️ 史诗级太阳仪式启动
                // ==========================================
                
                // 1. 启动平缓的太阳升起特效
                document.getElementById('holyLight').classList.add('ascend');
                
                // 2. 伴随日出，旧界面优雅地淡化隐去
                document.getElementById('mainContainer').classList.add('shatter-ui');
                document.getElementById('randomImg').style.filter = "brightness(0.9) contrast(1.1) blur(15px)";
                
                // 3. 0.8秒后，文字在太阳中心带着完美的重黑轮廓线，破晓而出！
                document.getElementById('congratsText').classList.add('show');

                // 成功：升级凭证
                sessionStorage.setItem('gate_key', 'stage3');
                
                // 4. 配合 3.5秒 的漫长宏大日出效果，3.8秒后执行传送
                setTimeout(() => {
                    window.location.href = 'page3.html';
                }, 3800);
            }
        });
    </script>
</body>
</html>
