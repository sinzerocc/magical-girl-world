<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uuuunn</title>
    <script>
        if (sessionStorage.getItem('gate_key') !== 'stage3') {
            alert('運命を欺くことはできない。 / You cannot deceive fate.');
            window.location.href = 'index.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #030307; font-family: "MS Mincho", "Heiti SC", serif; touch-action: manipulation; }
        .bg-image { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; position: absolute; top: 0; left: 0; z-index: 1; filter: brightness(0.3) blur(2px); }
        .container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 30px 10px; transition: filter 0.3s; }
        .title { color: #fff; font-size: 1.6rem; text-align: center; letter-spacing: 2px; text-shadow: 0 0 10px rgba(138, 43, 226, 0.8); user-select: none; pointer-events: none; line-height: 1.6; }
        .card-container { display: flex; gap: 25px; justify-content: center; align-items: center; width: 100%; max-width: 900px; height: 320px; }
        
        /* 初始状态：未解锁 */
        .tarot-card { 
            width: 170px; height: 290px; perspective: 1200px; 
            cursor: not-allowed; 
            opacity: 0.6;
            transition: transform 0.6s, opacity 0.6s; 
        }
        .tarot-card.ready { cursor: pointer; opacity: 1; }
        .tarot-card.ready:hover { transform: translateY(-5px); box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); }

        .card-inner { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.8); }
        
        .card-back { background: radial-gradient(circle at center, #10192c 0%, #070b14 100%); border: 3px double #d4af37; display: flex; justify-content: center; align-items: center; }
        .card-back::before { content: ''; position: absolute; width: 130px; height: 130px; border: 1px dashed rgba(212, 175, 55, 0.3); border-radius: 50%; background: repeating-conic-gradient(from 0deg, transparent 0deg 15deg, rgba(212, 175, 55, 0.05) 15deg 30deg); }
        .card-back::after { content: '☾'; position: absolute; font-size: 2.5rem; color: #e5c158; text-shadow: 0 0 15px rgba(229, 193, 88, 0.6); }

        .card-front { background: linear-gradient(135deg, #1d152b 0%, #0e0a16 100%); border: 2px solid #8a2be2; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; color: #fff; text-align: center; }
        .card-name { font-size: 1.1rem; color: #00ffff; margin-bottom: 15px; text-shadow: 0 0 5px #00ffff; font-weight: bold; }
        .card-desc { font-size: 0.85rem; line-height: 1.6; color: #bbb; }

        .tarot-card.flipped .card-inner { transform: rotateY(180deg); }
        .tarot-card.fade-out { opacity: 0; transform: scale(0.7); pointer-events: none; }
        .tarot-card.center-focus { transform: scale(1.2) !important; z-index: 99; pointer-events: none; opacity: 1; }

        .result-text { opacity: 0; color: #ff4a76; font-size: 1.15rem; text-align: center; max-width: 650px; transition: opacity 1s ease 0.8s; min-height: 60px; line-height: 1.6; text-shadow: 0 0 8px rgba(255,74,118,0.4); }
        .result-text.show { opacity: 1; }

        /* ==========================================
           🩸 狂暴重构：全屏流血与剧烈晃动特效（极速 1/3 压缩版）
           ========================================== */
        .blood-overlay {
            position: absolute; top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(110, 0, 0, 0.95) 0%, 
                rgba(139, 0, 0, 0.9) 40%, 
                rgba(40, 0, 0, 0.85) 85%, 
                transparent 100%);
            z-index: 999; pointer-events: none; 
            /* 特效光影坠落时间压缩：由 0.4s 缩短至 0.13s */
            transition: top 0.13s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .blood-overlay.drip { top: 0; }

        .fail-text-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            z-index: 1000; color: #ff2222; text-align: center; width: 100%;
            font-size: 1.6rem; font-weight: bold; letter-spacing: 4px; line-height: 2.2;
            opacity: 0; transition: opacity 0.1s ease, transform 0.1s ease;
            text-shadow: 0 0 20px #000, 0 0 10px #ff0000, 0 0 30px #ff0000; pointer-events: none;
        }
        .fail-text-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        @keyframes hardcore-shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-8px, 6px) rotate(-2deg); }
            30% { transform: translate(10px, -5px) rotate(2deg); }
            50% { transform: translate(-7px, -7px) rotate(-1deg); }
            70% { transform: translate(8px, 5px) rotate(2deg); }
            90% { transform: translate(-5px, 3px) rotate(-2deg); }
        }
        .shake-active { animation: hardcore-shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="bloodOverlay" class="blood-overlay"></div>
    
    <div id="failText" class="fail-text-overlay">
        「やはり、お前は運命の人ではないのか…？」<br>
        <span style="font-size: 1.2rem; opacity: 0.9; letter-spacing: 2px;">Are you truly not the chosen one...?</span>
    </div>

    <img id="randomImg" class="bg-image" src="" alt="Destiny">

    <div class="container" id="mainContainer">
        <div class="title" id="guideTitle">
            「 運命の選択 / The Choice of Destiny 」<br>
            <span style="font-size: 1rem; color: #aaa; display: block; margin-top: 10px;">目を閉じて、心の雑音を聞きなさい。四つの選択肢から、あなたの終点を選べ。</span>
            <span style="font-size: 0.85rem; color: #888; display: block;">Close your eyes. Choose your destination from the four choices.</span>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="tarot-card" onclick="drawCard(this, 0)">
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><div class="card-name" id="name0"></div><div class="card-desc" id="desc0"></div></div>
                </div>
            </div>
            <div class="tarot-card" onclick="drawCard(this, 1)">
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><div class="card-name" id="name1"></div><div class="card-desc" id="desc1"></div></div>
                </div>
            </div>
            <div class="tarot-card" onclick="drawCard(this, 2)">
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><div class="card-name" id="name2"></div><div class="card-desc" id="desc2"></div></div>
                </div>
            </div>
            <div class="tarot-card" onclick="drawCard(this, 3)">
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><div class="card-name" id="name3"></div><div class="card-desc" id="desc3"></div></div>
                </div>
            </div>
        </div>

        <div class="result-text" id="resultText"></div>
    </div>

    <audio id="bgm3" src="./bgm3.mp3" loop></audio>

    <script>
        const myImages = ['./p31.jpg'];
        document.getElementById('randomImg').src = myImages[Math.floor(Math.random() * myImages.length)];

        const audio = document.getElementById('bgm3');
        function tryPlayMusic() {
            audio.play().then(() => document.removeEventListener('click', tryPlayMusic)).catch(err => {});
        }
        tryPlayMusic();
        document.addEventListener('click', tryPlayMusic);

        const tarotPool = [
            { isTarget: true, name: "【 愚者 / THE FOOL 】", desc: "崖っぷちに立つ旅人。", conclusion: "「因果の糸が結ばれた。新世界への扉が開く…」\n(The threads of fate are tied. The door to the new world opens...)" },
            { isTarget: false, name: "【 死神 / DEATH 】", desc: "終焉を告げる黒き影。", conclusion: "「それは間違った選択だ。輪回は終わらない…」\n(That was a wrong choice. The cycle never ends...)" },
            { isTarget: false, name: "【 運命の轮 / WHEEL 】", desc: "逆回転を始めた歯车。", conclusion: "「時の針が巻き戻る。やり直すがいい…」\n(The clock hands rewind. Try it once more...)" },
            { isTarget: false, name: "【 月 / THE MOON 】", desc: "混沌を照らす不吉な月光。", conclusion: "「幻影に惑わされたな。もう一度選びなさい…」\n(You were deceived by illusions. Choose again...)" }
        ];

        // 从本地获取累计失败次数
        let failCount = parseInt(localStorage.getItem('p3_fail_count') || '0'); 

        let shuffled = [...tarotPool].sort(() => Math.random() - 0.5);
        for(let i=0; i<4; i++) {
            document.getElementById(`name${i}`).innerText = shuffled[i].name;
            document.getElementById(`desc${i}`).innerText = shuffled[i].desc;
        }

        let canDraw = false; 
        let hasDrawn = false; 

        // 🎯 限制：开始3秒不能选择任何牌（50ms 后才激活 ready 状态）
        setTimeout(() => {
            canDraw = true; 
            const cards = document.querySelectorAll('.tarot-card');
            cards.forEach(card => card.classList.add('ready'));
        }, 3000); 

        function drawCard(clickedCard, index) {
            if (!canDraw || hasDrawn) return;
            hasDrawn = true;

            // 🎯 核心机制：随机12次必定中奖保底（第11次失败后，第12次强行替换为目标卡牌）
            // 并彻底删除了原先 10 秒直接通关的时间作弊后门
            const triggerGuaranteedWin = (failCount >= 11);

            if (triggerGuaranteedWin) {
                shuffled[index] = tarotPool.find(item => item.isTarget);
                document.getElementById(`name${index}`).innerText = shuffled[index].name;
                document.getElementById(`desc${index}`).innerText = shuffled[index].desc;
            }

            const cards = document.querySelectorAll('.tarot-card');
            cards.forEach((card) => {
                if (card === clickedCard) {
                    card.classList.add('center-focus', 'flipped');
                } else {
                    card.classList.add('fade-out');
                }
            });

            document.getElementById('guideTitle').innerHTML = "「 啓示 / THE REVELATION LOG 」";
            const resultBox = document.getElementById('resultText');
            resultBox.innerText = shuffled[index].conclusion;
            resultBox.classList.add('show');

            if (shuffled[index].isTarget) {
                localStorage.removeItem('p3_fail_count');
                sessionStorage.setItem('gate_key', 'stage4_dawn');
                setTimeout(() => { window.location.href = 'page4.html'; }, 4000);
            } else {
                failCount++;
                localStorage.setItem('p3_fail_count', failCount);

                // ==========================================
                // ⏱️ 狂暴流血加速压缩版（总历时缩短为原先的 1/3，约 610ms）
                // ==========================================
                
                // 1. 瞬间（0.06秒后）爆发流血与疯狂震动
                setTimeout(() => {
                    document.body.classList.add('shake-active');
                    document.getElementById('bloodOverlay').classList.add('drip');
                    document.getElementById('mainContainer').style.filter = "blur(6px) grayscale(1)";
                }, 60);

                // 2. 0.16秒后，台词闪现
                setTimeout(() => {
                    document.getElementById('failText').classList.add('show');
                }, 160);

                // 3. 0.61秒（610ms）快速强推页面重载，绝不拖泥带水
                setTimeout(() => { 
                    window.location.reload(); 
                }, 610);
            }
        }
    </script>
</body>
</html>
