<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Girl World - The Dawn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0d0d16; font-family: "MS Mincho", "Heiti SC", serif; touch-action: manipulation; }
        
        /* 延续本地随机背景图逻辑 */
        .bg-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            pointer-events: none; 
            user-select: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            filter: brightness(0.4) blur(4px) contrast(1.1);
            animation: bgFadeIn 3s ease;
        }

        /* 圣光叠层 */
        .light-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(138, 43, 226, 0.08));
            z-index: 2;
            pointer-events: none;
        }

        .container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 3; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            overflow-y: auto; /* 防止照片太长时溢出 */
        }

        /* 黎明大标题 */
        .title { 
            color: #fff; 
            font-size: 2.2rem; 
            text-align: center; 
            letter-spacing: 5px; 
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8), 0 0 30px rgba(138, 43, 226, 0.5); 
            user-select: none; 
            pointer-events: none; 
            margin-bottom: 25px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        /* 双语叙事框 */
        .terminal-text {
            width: 100%;
            max-width: 650px;
            background: rgba(5, 5, 10, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .line { margin-bottom: 10px; opacity: 0; transform: translateY(5px); transition: all 0.5s ease; }
        .line.visible { opacity: 1; transform: translateY(0); }
        .line.highlight { color: #00ffff; text-shadow: 0 0 5px #00ffff; }

        /* ==========================================
           用户自定义照片与华丽相框 
        ========================================== */
        .photo-frame {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1), transform 2s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 450px;
            width: 90%;
            /* 曜金古典质感相框：双重边框加复杂阴影 */
            background: #11141c;
            padding: 15px;
            border: 4px solid #d4af37;
            outline: 2px solid #11141c;
            box-shadow: 0 0 0 6px rgba(212, 175, 55, 0.3), 0 15px 35px rgba(0,0,0,0.9), 0 0 30px rgba(212,175,55,0.2);
            border-radius: 4px;
            text-align: center;
        }
        
        /* 当打字机结束后触发显示 */
        .photo-frame.reveal {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .final-photo {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #000;
            filter: sepia(0.1) contrast(1.05); /* 赋予照片一丝丝复古高级感 */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        @keyframes bgFadeIn { from { filter: brightness(0) blur(10px); } to { filter: brightness(0.4) blur(4px) contrast(1.1); } }
        @keyframes titleGlow { from { text-shadow: 0 0 15px rgba(0, 255, 255, 0.8); } to { text-shadow: 0 0 25px rgba(0, 255, 255, 1), 0 0 15px rgba(138, 43, 226, 0.8); } }
    </style>
</head>
<body>

    <!-- 本地素材调用 -->
    <img id="randomImg" class="bg-image" src="" alt="The Dawn">
    <div class="light-overlay"></div>

    <div class="container">
        <div class="title">「 暁 / THE DAWN 」</div>

        <!-- 自动打印的双语叙事文本 -->
        <div class="terminal-text" id="terminalBox"></div>

        <!-- 终极照片墙相框 -->
        <div class="photo-frame" id="photoFrame">
            <!-- 你可以把你的终极照片命名为 photo.jpg 放在同目录下，也可以改这里的src -->
            <img class="final-photo" src="./photo.jpg" alt="The Miracle">
        </div>
    </div>

    <!-- 本地最后一首歌曲：bgm4.mp3 -->
    <audio id="bgm4" src="./bgm4.mp3" loop></audio>

    <script>
        // 1. 背景与音乐初始化
        const myImages = ['./p41.jpg'];
        document.getElementById('randomImg').src = myImages[Math.floor(Math.random() * myImages.length)];

        const audio = document.getElementById('bgm4');
        function tryPlayMusic() {
            audio.play().then(() => document.removeEventListener('click', tryPlayMusic)).catch(err => {});
        }
        tryPlayMusic();
        document.addEventListener('click', tryPlayMusic);

        // 2. 史诗感双语台词
        const scriptData = [
            { text: "無尽の輪廻を破り、ここまで辿り着いた旅人よ。", highlight: false },
            { text: "You have broken the endless loop and reached the end, traveler.", highlight: false },
            { text: "不条理な運命に縛られた魔法少女の世界は、ここで終わりを告げる。", highlight: false },
            { text: "The world of magical girls bound by absurd fate ends here.", highlight: false },
            { text: "君が手にしたのは、白紙のカード、そして真実の自由だ。", highlight: true },
            { text: "What you hold now is a blank card, and true freedom.", highlight: true },
            { text: "「奇跡は、諦めない心の中にだけ存在する。」", highlight: false },
            { text: "\"Miracles exist only within a heart that never gives up.\"", highlight: false }
        ];

        // 3. 动态逐行浮现逻辑
        const box = document.getElementById('terminalBox');
        let currentLine = 0;

        function printNextLine() {
            if (currentLine < scriptData.length) {
                const data = scriptData[currentLine];
                const p = document.createElement('div');
                p.className = 'line';
                if (data.highlight) p.classList.add('highlight');
                p.innerText = data.text;
                
                box.appendChild(p);

                setTimeout(() => {
                    p.classList.add('visible');
                }, 50);

                currentLine++;
                setTimeout(printNextLine, 1100); // 每一行间隔 1.1 秒
            } else {
                // 4. 文字全部打印完后，压轴的华丽相框带动画丝滑浮现！
                setTimeout(() => {
                    document.getElementById('photoFrame').classList.add('reveal');
                }, 500);
            }
        }

        // 启动打字机
        setTimeout(printNextLine, 1000);
    </script>
</body>
</html>
