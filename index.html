<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@#%￥%……%&……</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* 禁用双击放大缩放（特别是手机端），保证连续点击的流畅度 */
            touch-action: manipulation; 
            cursor: pointer;
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif;
        }
        /* 全屏图片样式 */
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* 防止图片被拖拽 */
            user-select: none;    /* 防止文字/图片被选中 */
        }

        /* ==================== 🔐 登录系统专属样式 (暗色科技风) ==================== */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(11, 13, 19, 0.98); /* 遮挡下方图片 */
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; /* 保证在最上层 */
            transition: opacity 0.5s ease;
        }
        
        .auth-container {
            width: 90%; max-width: 400px; background: #10141d; padding: 30px;
            border: 1px solid rgba(139, 162, 196, 0.2); border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); text-align: center;
        }
        .auth-container h2 { color: #6495ed; margin-bottom: 20px; letter-spacing: 2px; font-size: 1.4rem; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: rgba(230, 235, 245, 0.6); margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(20, 26, 38, 0.8);
            border: 1px solid rgba(100, 149, 237, 0.3); border-radius: 4px;
            color: #fff; font-size: 0.9rem; outline: none; -webkit-user-select: text; user-select: text;
        }
        .input-group input:focus { border-color: #6495ed; }
        
        .auth-btn {
            width: 100%; padding: 12px; background: rgba(100, 149, 237, 0.15);
            border: 1px solid #6495ed; color: #fff; border-radius: 4px;
            cursor: pointer; font-size: 0.9rem; margin-top: 10px; transition: all 0.3s;
        }
        .auth-btn:hover { background: rgba(100, 149, 237, 0.3); transform: scale(1.01); }
        
        .auth-msg { font-size: 0.85rem; color: #ff6b6b; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container" onclick="event.stopPropagation();">
            <h2 id="authTitle">観測点 - ログイン</h2>
            
            <div class="input-group">
                <label>账号 / Username</label>
                <input type="text" id="username" placeholder="请输入您的账号...">
            </div>
            <div class="input-group">
                <label>密码 / Password</label>
                <input type="password" id="password" placeholder="请输入您的密码...">
            </div>
            
            <button class="auth-btn" id="submitBtn" onclick="handleAuth()">登 录</button>
            <div class="auth-msg" id="errorMsg"></div>
        </div>
    </div>

    <img id="randomImg" class="bg-image" src="" alt="Background">

    <audio id="bgm" src="bgm.mp3" loop></audio>

    <script>
        // ==========================================
        // 1. 配置你自己的图片文件名
        // ==========================================
        const myImages = [
            '1.jpg',
            '2.jpg',
            '3.jpg',
            '4.jpg',
            '5.jpg'
        ];

        // 随机挑选一张显示
        if (myImages.length > 0) {
            const randomIndex = Math.floor(Math.random() * myImages.length);
            document.getElementById('randomImg').src = myImages[randomIndex];
        }

        // ==========================================
        // 🔐 2. 登录控制核心逻辑（去除了注册机制）
        // ==========================================
        let isUserAuthenticated = false; // 标记用户是否登录成功以开启后续游戏计时与点击机制

        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const msgDom = document.getElementById('errorMsg');
            
            if(!user || !pass) {
                msgDom.style.color = "#ff6b6b";
                msgDom.innerText = "账号或密码不能为空。";
                return;
            }

            // 记录当前登录用户到 Session 
            sessionStorage.setItem('current_logged_user', user);
            
            // 正常解禁主界面，进入点击和挂机判断
            msgDom.style.color = "#2ecc71";
            msgDom.innerText = "同步成功，正在载入世界...";
            setTimeout(() => { 
                document.getElementById('authOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('authOverlay').style.display = 'none';
                    isUserAuthenticated = true; // 允许点击和音乐机制生效
                    startAdfTimer(); // 开启 3 分钟挂机定时器
                }, 500);
            }, 1000);
        }

        // ==========================================
        // 🕹️ 3. 核心交互：解禁音乐 + 5秒点8下跳转
        // ==========================================
        const audio = document.getElementById('bgm');
        let clickTimestamps = []; 

        document.addEventListener('click', function() {
            // 如果用户还没登录，点击空白处不触发游戏逻辑
            if (!isUserAuthenticated) return;

            // 只要用户点第一下，就尝试播放音乐
            if (audio.paused) {
                audio.play().catch(err => {
                    console.log("音频播放被拦截，等待下一次点击: ", err);
                });
            }

            // 【连击算法】记录当前点击的时间
            const now = Date.now();
            clickTimestamps.push(now);

            // 只保留 5 秒之内的点击记录
            clickTimestamps = clickTimestamps.filter(time => now - time < 5000);

            // 如果 5 秒内的点击次数达到了 8 次
            if (clickTimestamps.length >= 8) {
                sessionStorage.setItem('gate_key', 'stage2');
                window.location.href = 'page2.html';
            }
        });

        // ==========================================
        // ⏳ 4. 隐藏机制：静止停留 3 分钟自动飞升
        // ==========================================
        function startAdfTimer() {
            setTimeout(() => {
                // 只有当用户没有在5秒内提前通关时才自动跳转
                if (sessionStorage.getItem('gate_key') !== 'stage2') {
                    sessionStorage.setItem('gate_key', 'stage2');
                    window.location.href = 'page2.html';
                }
            }, 180000); // 3分钟后生效
        }
    </script>
</body>
</html>
