<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Magical Girl World - Void Board</title>
    <script>
        // 【看守机制】只有真正解开数独的人，才配进入虚空留言板
        if (sessionStorage.getItem('gate_key') !== 'stage_void_board_authorized') {
            alert('因果のアクセス権がありません。 / Unauthorized.');
            window.location.href = 'index.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Courier New", "MS Mincho", monospace; }
        body, html { width: 100%; height: 100%; background-color: #02060c; color: #00ffff; overflow-x: hidden; }
        
        /* 滚轮微调 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.2); border-radius: 2px; }

        .wrapper { max-width: 700px; margin: 0 auto; padding: 40px 20px; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { text-align: center; margin-bottom: 40px; border-bottom: 1px dashed rgba(0, 255, 255, 0.2); padding-bottom: 20px; }
        h1 { font-size: 1.4rem; letter-spacing: 4px; text-shadow: 0 0 10px #00ffff; color: #fff; }
        .subtitle { font-size: 0.75rem; color: #ff0055; margin-top: 8px; letter-spacing: 1px; text-shadow: 0 0 5px rgba(255,0,85,0.4); }

        /* 📨 留言输入区域 */
        .input-panel { background: rgba(4, 15, 30, 0.7); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 6px; padding: 20px; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,255,255,0.05); }
        .input-panel h3 { font-size: 0.85rem; margin-bottom: 12px; color: rgba(255,255,255,0.7); }
        
        textarea {
            width: 100%; height: 80px; background: #010409; border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 4px; padding: 10px; color: #fff; font-size: 0.85rem; resize: none; outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: #ff0055; box-shadow: 0 0 8px rgba(255,0,85,0.2); }

        .panel-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .char-count { font-size: 0.7rem; color: rgba(0, 255, 255, 0.4); }
        
        button {
            background: transparent; border: 1px solid #ff0055; color: #ff0055;
            padding: 6px 20px; font-size: 0.8rem; cursor: pointer; border-radius: 4px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; box-shadow: 0 0 5px rgba(255, 0, 85, 0.2);
        }
        button:hover { background: #ff0055; color: #fff; box-shadow: 0 0 15px #ff0055; }

        /* 📜 历史留言流 */
        .board-stream { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
        .message-card {
            background: rgba(3, 8, 15, 0.8); border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 6px; padding: 15px; position: relative; animation: fadeIn 0.5s ease-out;
        }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: rgba(0, 255, 255, 0.3); margin-bottom: 8px; border-bottom: 1px solid rgba(0, 255, 255, 0.05); padding-bottom: 4px; }
        .card-body { font-size: 0.85rem; color: rgba(255, 255, 255, 0.85); line-height: 1.6; word-wrap: break-word; }

        /* 系统种子数据（内置一些宿命感的神秘遗言，让留言板不显得空旷） */
        .message-card.system { border-color: rgba(255, 0, 85, 0.15); background: rgba(10, 4, 12, 0.5); }
        .message-card.system .card-meta { color: rgba(255, 0, 85, 0.4); }
        .message-card.system .card-body { color: rgba(255, 255, 255, 0.6); font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>「 虚空の意識観測板 」</h1>
            <div class="subtitle">[VOID_BOARD]: LOG_RECORD_STREAM // 意识残渣沉淀处</div>
        </header>

        <div class="input-panel">
            <h3>将你的意识刻入虚空底质：</h3>
            <textarea id="msgInput" maxlength="200" placeholder="留下你的代号、断章、或者未竟的誓言..."></textarea>
            <div class="panel-footer">
                <div class="char-count" id="charCount">0 / 200</div>
                <button id="submitBtn">投放意识 (SUBMIT)</button>
            </div>
        </div>

        <div class="board-stream" id="boardStream"></div>
    </div>

    <script>
        const msgInput = document.getElementById('msgInput');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const boardStream = document.getElementById('boardStream');

        // 内置一些带有里世界宏大叙事的系统残存信息
        const systemSeeds = [
            { id: "sys-1", time: "2026/05/12 14:02:55", author: "OBSERVER_#14", text: "即使世界重构了，我也依然记得那个在红黑雨夜里消失的魔法回路……" },
            { id: "sys-2", time: "2026/06/01 03:14:22", author: "ANONYMOUS_VOID", text: "数独矩阵根本不是为了困住谁，它只是给狂躁的数据建立一个锚点罢了。" },
            { id: "sys-3", time: "2026/06/15 22:45:10", author: "ECHO_PULSE", text: "如果你能看到这条留言，说明你已经成功划开了421的深海结界。做得好，同行者。" }
        ];

        // 动态更新字数
        msgInput.addEventListener('input', () => {
            charCount.innerText = `${msgInput.value.length} / 200`;
        });

        // 渲染留言列表
        function renderMessages() {
            boardStream.innerHTML = '';
            
            // 提取用户存入 localStorage 的留言
            const userMsgs = JSON.parse(localStorage.getItem('void_user_messages') || '[]');
            
            // 合并系统种子和用户留言，按时间倒序排列
            const allMsgs = [...userMsgs, ...systemSeeds];

            allMsgs.forEach(msg => {
                const card = document.createElement('div');
                card.className = `message-card ${msg.id.startsWith('sys') ? 'system' : ''}`;
                
                card.innerHTML = `
                    <div class="card-meta">
                        <span>NODE: ${msg.author}</span>
                        <span>${msg.time}</span>
                    </div>
                    <div class="card-body">${escapeHTML(msg.text)}</div>
                `;
                boardStream.appendChild(card);
            });
        }

        // 安全过滤HTML字符
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 提交留言逻辑
        submitBtn.addEventListener('click', () => {
            const text = msgInput.value.trim();
            if (!text) return;

            const now = new Date();
            const timeStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

            // 生成一个新的用户节点留言
            const newMsg = {
                id: "user-" + Date.now(),
                time: timeStr,
                author: "OBSERVER_" + Math.floor(1000 + Math.random() * 9000),
                text: text
            };

            const userMsgs = JSON.parse(localStorage.getItem('void_user_messages') || '[]');
            userMsgs.unshift(newMsg); // 插入到最新位置
            localStorage.setItem('void_user_messages', JSON.stringify(userMsgs));

            // 清空并刷新
            msgInput.value = '';
            charCount.innerText = '0 / 200';
            renderMessages();
        });

        // 初始化载入
        renderMessages();
    </script>
</body>
</html>
