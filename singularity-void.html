<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Girl World - Singularity Void</title>
    <script>
        // 【看守机制】必须拿到了由 page4 相框签发的专属通行凭证才能进入
        if (sessionStorage.getItem('gate_key') !== 'stage_secret_void') {
            alert('虚空を覗く資格がありません。 / Unauthorized.');
            window.location.href = 'index.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Courier New", monospace; }
        
        /* 全屏数字雨画布 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: opacity(0.25) blur(0.5px); /* 让背景代码雨保持低调，不抢中间文字视线 */
        }

        /* 核心文字容器 */
        .container { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            pointer-events: none; /* 让鼠标穿透，不影响潜在交互 */
        }

        /* 虚空核心故障艺术文字 */
        .void-message { 
            text-align: center; 
            font-size: 1.3rem; 
            line-height: 2.2; 
            letter-spacing: 3px; 
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055, 0 0 20px rgba(255, 0, 85, 0.5); 
            animation: glitch 1.5s infinite alternate ease-in-out; 
        }

        .sub-message {
            margin-top: 20px;
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff; 
            font-size: 1rem;
            animation: breathe 3s infinite alternate ease-in-out;
        }

        /* ==========================================
           🌟 新增：“敬请期待”量子故障艺术文本样式
           ========================================== */
        .stay-tuned {
            margin-top: 35px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 6px;
            line-height: 1.8;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px #00ffff;
            animation: glitch-blue 2s infinite ease-in-out;
        }

        /* 虚空震颤故障动画 */
        @keyframes glitch { 
            0% { transform: skewX(0deg) scale(1); filter: hue-rotate(0deg); }
            90% { transform: skewX(0deg) scale(1); filter: hue-rotate(0deg); }
            93% { transform: skewX(5deg) scale(1.02); filter: hue-rotate(90deg); }
            95% { transform: skewX(-3deg) scale(0.98); filter: hue-rotate(180deg); }
            100% { transform: skewX(0deg) scale(1); filter: hue-rotate(0deg); }
        }

        /* “敬请期待”专属幽蓝故障效果 */
        @keyframes glitch-blue {
            0%, 85%, 100% { transform: skewX(0deg); filter: blur(0px); opacity: 0.9; }
            88% { transform: skewX(-8deg) scaleY(1.05); filter: hue-rotate(-50deg) blur(1px); opacity: 1; }
            92% { transform: skewX(10deg) scaleX(0.95); filter: hue-rotate(120deg); opacity: 0.8; }
            95% { transform: translateY(-3px); filter: blur(0px); }
        }

        /* 呼吸灯效果 */
        @keyframes breathe {
            0% { opacity: 0.4; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="void-message">
            「 特異点の虚空へようこそ。 」<br>
            Welcome to the Singularity Void.<br>
            <div class="sub-message">
                [ ここが真の裏世界。あなたの新しい物語が始まる。 ]<br>
                [ This is the hidden deep side. A new chronicle awaits. ]
            </div>
            <div class="stay-tuned">
                「 乞うご期待。 」<br>
                Stay Tuned.
            </div>
        </div>
    </div>

    <audio id="voidBgm" src="./Yuki Kajiura Official.mp3" loop></audio>

    <script>
        // ==========================================
        // 🎵 1. 音乐自动解禁播发机制
        // ==========================================
        const audio = document.getElementById('voidBgm');
        function tryPlayMusic() {
            audio.play().then(() => document.removeEventListener('click', tryPlayMusic)).catch(err => {});
        }
        tryPlayMusic();
        document.addEventListener('click', tryPlayMusic);

        // ==========================================
        // 💾 2. 最高级安全防御：进门即销毁钥匙
        // ==========================================
        sessionStorage.removeItem('gate_key');

        // ==========================================
        // 🌌 3. 矩阵代码雨经典黑客特效（已全量补全）
        // ==========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            // 随屏幕大小重置雨滴序列
            for (let x = 0; x < columns; x++) {
                if(rainDrops[x] === undefined) rainDrops[x] = 1;
            }
        }

        const katakana = "ΞΔΦΨΩ0123456789†‡☠★🔮★☠‡†".split("");
        const fontSize = 16;
        let columns = window.innerWidth / fontSize;
        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = Math.random() * -100; // 让起点错落有致，避免一整排一起掉落
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawMatrix() {
            // 每帧绘制一层微弱透明的黑幕，形成长拖尾渐变阴影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 设置代码雨文字颜色
            ctx.fillStyle = '#ff0055'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                // 随机捞一个字符
                const text = katakana[Math.floor(Math.random() * katakana.length)];
                const x = i * fontSize;
                const y = rainDrops[i] * fontSize;

                ctx.fillText(text, x, y);

                // 如果雨滴掉出屏幕外，且满足概率，则重置回顶部
                if (y > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                
                // 坐标下移
                rainDrops[i]++;
            }
        }

        // 保持流畅渲染率
        setInterval(drawMatrix, 30);
    </script>
</body>
</html>
