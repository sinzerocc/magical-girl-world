<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Girl World - Singularity Void</title>
    <script>
        // 【看守机制】读取钥匙
        const currentKey = sessionStorage.getItem('gate_key');
        if (currentKey !== 'stage_secret_void') {
            alert('虚空を覗く資格がありません。 / Unauthorized.');
            window.location.href = 'index.html';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Courier New", monospace; }
        
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            filter: opacity(0.22) blur(0.5px);
        }

        .container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }

        .void-message { 
            text-align: center; font-size: 1.3rem; line-height: 2.2; letter-spacing: 3px; color: #ff0055;
            text-shadow: 0 0 10px #ff0055, 0 0 20px rgba(255, 0, 85, 0.5); 
            animation: glitch 1.5s infinite alternate ease-in-out; 
            user-select: none;
        }

        .sub-message {
            margin-top: 15px; color: #00ffff; text-shadow: 0 0 10px #00ffff; font-size: 1rem;
            animation: breathe 3s infinite alternate ease-in-out;
        }

        .stay-tuned {
            margin-top: 30px; font-size: 1.2rem; font-weight: bold; color: #ffffff; letter-spacing: 6px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px #00ffff;
            animation: glitch-blue 2s infinite ease-in-out;
        }

        /* ==========================================
           🌊 自动浮现的因果气泡（充斥圣经、炼金术与魔法混淆线索）
           ========================================== */
        .log-terminal {
            margin-top: 40px;
            width: 100%; max-width: 620px; height: 0;
            opacity: 0;
            background: rgba(3, 8, 15, 0.88);
            border: 1px solid rgba(0, 255, 255, 0);
            border-radius: 6px; padding: 0 12px;
            font-family: 'Courier New', 'MS Mincho', monospace;
            text-align: left; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0), 0 0 30px rgba(0,0,0,0.95);
            transition: height 2.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s ease-out, border-color 2.5s ease;
        }

        .log-terminal.surfaced {
            height: 200px; opacity: 1; padding: 12px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1), 0 0 35px rgba(255, 0, 85, 0.05);
        }

        .system-status {
            color: #00ffff; font-size: 0.8rem; font-weight: bold;
            border-bottom: 1px dashed rgba(0, 255, 255, 0.2);
            padding-bottom: 6px; margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .log-stream { height: 145px; overflow-y: hidden; display: flex; flex-direction: column; gap: 6px; }
        .log-line { font-size: 0.72rem; line-height: 1.5; color: rgba(0, 210, 255, 0.55); letter-spacing: 1px; }
        .log-line span.tag { color: #8a2be2; } /* 神秘学日志标签用紫色 */
        
        /* 渗集数字的高亮极其隐晦：不再有红背景，只有淡淡的白金荧光，伪装在神棍文本中 */
        .log-line span.mystery-num {
            color: #fff; font-weight: bold;
            text-shadow: 0 0 4px #ffe89e, 0 0 8px rgba(255,255,255,0.8);
            padding: 0 2px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="void-message">
            「 特異点の虚空へようこそ。 」<br>
            Welcome to the Singularity Void.<br>
            <div class="sub-message">
                [ ここが真の裏世界。因果の海がすべてを洗流す。 ]
            </div>
            <div class="stay-tuned">
                「 乞うご期待。 」<br>
                Stay Tuned.
            </div>
        </div>

        <div class="log-terminal" id="logTerminal">
            <div class="system-status">
                [ETHER_NET]: OCCULT_RESONANCE // 正在解析因果深海中沉淀的意识残渣...
            </div>
            <div class="log-stream" id="logStream"></div>
        </div>
    </div>

    <audio id="voidBgm" src="./bgm4.mp3" loop></audio>

    <script>
        // 1. 音频控制
        const audio = document.getElementById('voidBgm');
        function tryMusic() { audio.play().then(() => document.removeEventListener('click', tryMusic)).catch(err => {}); }
        tryMusic(); document.addEventListener('click', tryMusic);

        // 2. 4秒后气泡自动从深海浮现
        const logTerminal = document.getElementById('logTerminal');
        setTimeout(() => {
            logTerminal.classList.add('surfaced');
            setTimeout(appendLog, 600);
        }, 4000); 

        // ==========================================
        // 🧩 3. 混合神学、炼金术与魔法因果的数据库
        // ==========================================
        // 正确密码修改为：421
        const database = [
            "「SYS_ECHO: 翠玉录(Tabula Smaragdina) 协议已载入。如其在上，如其在下。」",
            "「揭开羔羊的封印，见有<span class='mystery-num'>4</span>匹马自虚空跃出，其色为主宰者的审判。 // ARTIFACT_ALPHA」", // 线索 4
            "「yip是谁？为什么因果回路里到处都在强行借调这个代号……」",
            "「炼金术之秘：唯有借由双生（极性<span class='mystery-num'>2</span>）的对立重组，真汞方能化为贤者之石。 // ARTIFACT_BETA」", // 线索 2
            "「原来，命中注定的人，从一开始就不存在啊。」",
            "「ERROR: 魔法回路产生严重排异。第13个因果观测点已经处于溃灭边缘。」",
            "「万物归于太一（The <span class='mystery-num'>1</span>）。始源即是终点，虚空将在唯一的凝视中收缩。 // ARTIFACT_OMEGA」", // 线索 1
            "「不要在此寻找凡尘的键位。直接将打捞出的三大遗物坐标共鸣敲击，封印即解。」",
            "「循环了1402次，根本没有第五页，迷失在此的人，请放弃挣扎吧。」"
        ];

        const logStream = document.getElementById('logStream');
        let logIndex = 0;

        function appendLog() {
            if (!logTerminal.classList.contains('surfaced')) return;
            
            const text = database[logIndex % database.length];
            logIndex++;

            const line = document.createElement('div');
            line.className = 'log-line';
            
            const h = String(Math.floor(Math.random() * 24)).padStart(2, '0');
            const m = String(Math.floor(Math.random() * 60)).padStart(2, '0');
            const s = String(Math.floor(Math.random() * 60)).padStart(2, '0');
            
            // 随机分配黑客或神秘学标签
            const tag = Math.random() > 0.5 ? "<span class='tag'>[APOCALYPSE]</span> " : "<span>[KERNEL]</span> ";

            line.innerHTML = `${tag}${h}:${m}:${s} // ${text}`;
            logStream.appendChild(line);

            if (logStream.childNodes.length > 6) { logStream.removeChild(logStream.firstChild); }
            logStream.scrollTop = logStream.scrollHeight;

            setTimeout(appendLog, 3000); // 每3秒刷新一条
        }

        // ==========================================
        // ⌨️ 4. 盲敲监听核心：玩家输入 421 跳转数独页面
        // ==========================================
        let inputBuffer = "";
        const targetSecret = "421"; // 新的因果代号

        document.addEventListener('keydown', (e) => {
            if (/[0-9]/.test(e.key)) {
                inputBuffer += e.key;
                if (inputBuffer.length > targetSecret.length) {
                    inputBuffer = inputBuffer.substring(inputBuffer.length - targetSecret.length);
                }
                
                if (inputBuffer === targetSecret) {
                    sessionStorage.setItem('gate_key', 'sudoku_trial');
                    window.location.href = 'sudoku.html';
                }
            }
        });

        // ==========================================
        // 🌌 5. Canvas 代码雨
        // ==========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            for (let x = 0; x < columns; x++) { if(rainDrops[x] === undefined) rainDrops[x] = 1; }
        }
        const katakana = "ΞΔΦΨΩ0123456789†‡☠★🔮★☠‡†".split("");
        const fontSize = 16;
        let columns = window.innerWidth / fontSize;
        const rainDrops = [];
        for (let x = 0; x < columns; x++) { rainDrops[x] = Math.random() * -100; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0055'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = katakana[Math.floor(Math.random() * katakana.length)];
                const x = i * fontSize; const y = rainDrops[i] * fontSize;
                ctx.fillText(text, x, y);
                if (y > canvas.height && Math.random() > 0.975) { rainDrops[i] = 0; }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);
    </script>
</body>
</html>
